version: 2

models:
  - name: stg_employees_transformed
    description: Cleaned and enriched employee data.

    columns:
      - name: employee_id
        tests:
          - unique
          - not_null

      - name: email
        tests:
          - not_null

      - name: phone
        tests:
          - not_null

      - name: employment_status
        tests:
          - not_null